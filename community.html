<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>묻고답하기</title>
<link id="theme-css" rel="stylesheet" href="./theme-dark.css">
<script src="./theme.js"></script>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);padding:12px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;text-decoration:none;margin-bottom:16px;transition:all 0.15s}
.back-btn:hover{border-color:var(--accent);color:var(--text)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header h1{font-size:20px;color:var(--text2)}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.user-info{font-size:12px;color:var(--accent);font-weight:600}
.btn{padding:7px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-primary{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
.btn-primary:hover{background:rgba(93,207,245,0.25)}
.btn-danger{background:rgba(239,83,80,0.1);color:#ef5350;border:1px solid rgba(239,83,80,0.2)}
.btn-danger:hover{background:rgba(239,83,80,0.2)}
.btn-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-gray:hover{border-color:var(--accent);color:var(--text)}
.write-form{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.write-form input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border3);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;margin-bottom:8px}
.write-form input:focus{outline:none;border-color:var(--accent)}
.write-form-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.empty{text-align:center;color:var(--text4);font-size:13px;padding:32px 0}
.block-btn{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--border3);background:none;color:var(--text4);cursor:pointer;font-family:inherit;margin-left:4px}
.block-btn:hover{border-color:#ef5350;color:#ef5350}
.blocked-count{font-size:11px;color:var(--text4);text-align:right;margin-bottom:6px}
.blocked-count a{color:var(--accent);cursor:pointer;text-decoration:none}
.ql-toolbar{background:var(--bg3);border:1px solid var(--border3)!important;border-radius:8px 8px 0 0}
.ql-container{background:var(--bg3);border:1px solid var(--border3)!important;border-top:none!important;border-radius:0 0 8px 8px;min-height:120px;font-family:'Malgun Gothic',sans-serif;font-size:13px;color:var(--text)}
.ql-editor{color:var(--text);min-height:120px}
.ql-editor.ql-blank::before{color:var(--text4)}
.ql-snow .ql-stroke{stroke:var(--text2)!important}
.ql-snow .ql-fill{fill:var(--text2)!important}
.ql-snow .ql-picker{color:var(--text2)!important}
.ql-snow .ql-picker-options{background:var(--bg2)!important;border-color:var(--border)!important}
.ql-snow.ql-toolbar button:hover .ql-stroke{stroke:var(--accent)!important}
.ql-snow.ql-toolbar button.ql-active .ql-stroke{stroke:var(--accent)!important}

/* ── 카드형 게시글 목록 ── */
.post-list-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.post-card{padding:11px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background 0.1s}
.post-card:last-child{border-bottom:none}
.post-card:hover{background:var(--bg3)}
.post-card.pinned{background:rgba(255,167,38,0.05)}
.post-card.pinned:hover{background:rgba(255,167,38,0.1)}

/* 1행: 번호 + 작성자 + 날짜 */
.post-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.post-num{font-size:11px;color:var(--text4);min-width:18px}
.post-author{font-size:12px;color:var(--text2);font-weight:600}
.post-date{margin-left:auto;font-size:11px;color:var(--text4);white-space:nowrap}

/* 2행: 제목 */
.post-title{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;text-decoration:none;display:block}
.post-title:hover{color:var(--accent)}
.pin-icon{font-size:12px;margin-right:3px}

/* 3행: 조회수 */
.post-footer{display:flex;align-items:center;gap:12px}
.post-views{font-size:11px;color:var(--text4)}
</style>
</head>
<body>

<a id="back-btn" href="./index.html" class="back-btn">← 메인으로</a>

<div class="header">
  <h1>묻고답하기</h1>
  <div class="header-right" id="header-right">
    <span class="user-info" id="user-info"></span>
    <button class="btn btn-gray" id="auth-btn"></button>
    <button class="btn btn-primary" id="write-btn" style="display:none" onclick="location.href='./write.html?board=qna'">글쓰기</button>
  </div>
</div>

<div id="blocked-info"></div>

<div class="post-list-wrap" id="post-list">
  <div class="empty">로딩 중...</div>
</div>

<script src="./sb_config.js"></script>
<script>
// ?from= 파라미터를 읽어서 뒤로가기 URL 결정
(function() {
  const from = new URLSearchParams(location.search).get('from');
  const allowed = ['community','weekly','guide','info'];
  const backBtn = document.getElementById('back-btn');
  if(from && allowed.includes(from)) {
    backBtn.href = `./index.html?tab=${from}`;
  }
})();

const user = getUser();

// 차단 관리
function getBlockList() { try { return JSON.parse(localStorage.getItem('block_list') || '[]'); } catch { return []; } }
function saveBlockList(list) { localStorage.setItem('block_list', JSON.stringify(list)); }
function isBlocked(userId) { return getBlockList().includes(userId); }
function blockUser(userId, nickname) {
  if(!confirm(`"${nickname}"님을 차단할까요? 이 유저의 글이 숨겨집니다.`)) return;
  const list = getBlockList();
  if(!list.includes(userId)) { list.push(userId); saveBlockList(list); }
  loadPosts();
}
function unblockUser(userId) {
  const list = getBlockList().filter(id => id !== userId);
  saveBlockList(list);
  loadPosts();
}
function showBlockList() {
  const list = getBlockList();
  if(list.length === 0) { alert('차단한 유저가 없어요.'); return; }
  const result = list.map((id, i) => `${i+1}. ${id}`).join('\n');
  if(confirm(`차단 목록:\n${result}\n\n전체 차단 해제할까요?`)) {
    saveBlockList([]);
    loadPosts();
  }
}

if(user) {
  document.getElementById('user-info').textContent = user.nickname || user.username;
  document.getElementById('auth-btn').textContent = '로그아웃';
  document.getElementById('auth-btn').onclick = logout;
  document.getElementById('write-btn').style.display = '';
  if(user.is_admin) {
    const adminBtn = document.createElement('button');
    adminBtn.className = 'btn btn-danger';
    adminBtn.textContent = '관리자';
    adminBtn.onclick = () => location.href = './admin.html';
    document.getElementById('header-right').appendChild(adminBtn);
  }
} else {
  document.getElementById('auth-btn').textContent = '로그인';
  document.getElementById('auth-btn').onclick = () => location.href = './login.html?from=' + encodeURIComponent(location.href.split('/').pop());
}

async function loadPosts() {
  const container = document.getElementById('post-list');
  container.innerHTML = '<div class="empty">로딩 중...</div>';
  const blockList = getBlockList();

  // 차단 목록 표시
  const blockedInfo = document.getElementById('blocked-info');
  if(blockList.length > 0) {
    blockedInfo.innerHTML = `<div class="blocked-count">차단된 유저 ${blockList.length}명 · <a onclick="showBlockList()">차단 관리</a></div>`;
  } else {
    blockedInfo.innerHTML = '';
  }

  try {
    const posts = await supabase('GET', 'posts', null, '?board=eq.qna&order=is_pinned.desc,created_at.desc');
    if(!posts || posts.length === 0) {
      container.innerHTML = '<div class="empty">아직 글이 없어요. 첫 글을 남겨보세요!</div>';
      return;
    }
    const filtered = posts.filter(p => !blockList.includes(p.user_id));
    if(filtered.length === 0) {
      container.innerHTML = '<div class="empty">표시할 글이 없어요.</div>';
      return;
    }
    let num = filtered.filter(p => !p.is_pinned).length;
    container.innerHTML = filtered.map(p => {
      const isMe = user && user.id === p.user_id;
      const blockBtn = user && !isMe
        ? `<button class="block-btn" onclick="event.stopPropagation();blockUser('${p.user_id}','${p.nickname||p.username}')">차단</button>`
        : '';
      const numDisplay = p.is_pinned ? '📌' : num--;
      const titlePrefix = p.is_pinned ? '<span class="pin-icon">📌</span>' : '';
      return `
        <div class="post-card${p.is_pinned ? ' pinned' : ''}" onclick="location.href='./community_view.html?id=${p.id}'">
          <div class="post-meta">
            <span class="post-num">${p.is_pinned ? '' : numDisplay}</span>
            <span class="post-author">${p.nickname || p.username}${blockBtn}</span>
            <span class="post-date">${p.created_at.slice(0,10).replace(/-/g,'.')}</span>
          </div>
          <a class="post-title" href="./community_view.html?id=${p.id}" onclick="event.stopPropagation()">${titlePrefix}${p.title}</a>
          <div class="post-footer">
            <span class="post-views">👁 ${p.views || 0}</span>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    container.innerHTML = `<div class="empty">불러오기 실패: ${e.message}</div>`;
  }
}

loadPosts();
</script>
</body>
</html>
