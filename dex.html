<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>드래곤 도감</title>

<script src="./desc.js"></script>

<style>
[data-theme="dark"]{--bg:#0e1116;--bg2:#161a22;--bg3:#1c212c;--border:#23293a;--border2:#1b1f2a;--border3:#2d3447;--text:#eaecf2;--text2:#b3b9c7;--text3:#7d8597;--text4:#565d6e;--accent:#7aa2f7;--accent-bg:rgba(122,162,247,0.12);--accent-border:rgba(122,162,247,0.30)}
[data-theme="light"]{--bg:#f7f7f8;--bg2:#ffffff;--bg3:#f1f2f4;--border:#e6e7ea;--border2:#eeeff2;--border3:#d4d6db;--text:#15171c;--text2:#4a4d57;--text3:#71757f;--text4:#9aa0aa;--accent:#2f6fed;--accent-bg:rgba(47,111,237,0.10);--accent-border:rgba(47,111,237,0.32)}
[data-theme="beige"]{--bg:#f3ecdd;--bg2:#faf3e2;--bg3:#ebe0c7;--border:#d8caa8;--border2:#e1d4b3;--border3:#c0ad84;--text:#2a2316;--text2:#5a4e34;--text3:#837553;--text4:#a99971;--accent:#b06a1e;--accent-bg:rgba(176,106,30,0.10);--accent-border:rgba(176,106,30,0.32)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* 상단 바 */
#top-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2)}
#back-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;border:1px solid var(--border3);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;text-decoration:none;transition:all 0.12s;flex-shrink:0}
#back-btn:hover{border-color:var(--accent-border);color:var(--text)}
#top-title{font-size:14px;font-weight:600;color:var(--text2)}

/* 필터 */
#filter-section{padding:12px 0 10px;border-bottom:1px solid var(--border);margin-bottom:14px}
#search-row{margin-bottom:8px}
#search-input{width:100%;padding:9px 14px;border:1px solid var(--border3);border-radius:8px;font-size:14px;background:var(--bg3);color:var(--text);outline:none}
#search-input:focus{border-color:var(--accent-border)}
#search-input::placeholder{color:var(--text4)}
#filter-row{display:flex;flex-direction:column;gap:6px}
.filter-line{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.filter-label{font-size:11px;color:var(--text3);margin-right:2px;flex-shrink:0}
.ftag{padding:4px 10px;border-radius:16px;font-size:11px;border:1px solid var(--border3);cursor:pointer;background:var(--bg3);color:var(--text2);transition:all 0.12s;display:flex;align-items:center;gap:4px}
.ftag img{width:16px;height:16px;border-radius:3px;display:block}
.ftag:hover{border-color:var(--accent-border);color:var(--text)}
.ftag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-sep{width:1px;height:16px;background:var(--border3);margin:0 4px;flex-shrink:0;align-self:center}
#filter-count{font-size:12px;color:var(--text3);margin-top:7px}

/* 메인 */
#page{max-width:900px;margin:0 auto;padding:16px 16px 64px}

/* 드래곤 엔트리 */
#entries{animation:fadeIn 0.15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.dragon-entry{border:1px solid var(--border);border-radius:12px;background:var(--bg2);margin-bottom:16px;overflow:hidden}
.entry-body{display:flex;gap:20px;padding:20px;align-items:flex-start}

/* 이미지 박스 */
.img-box{width:190px;flex-shrink:0;border:1px solid var(--border3);border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;min-height:190px;overflow:hidden}
.main-img{width:170px;height:170px;object-fit:contain;display:block}
.main-img-ph{width:170px;height:170px;display:none;align-items:center;justify-content:center;color:var(--text4);font-size:12px}

/* 정보 패널 */
.info-panel{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
.name-meta{display:flex;flex-direction:column;gap:6px}
.dragon-name{font-size:22px;font-weight:700;color:var(--text)}
.meta-row{display:flex;align-items:center;font-size:13px;color:var(--text2);flex-shrink:0;flex-wrap:wrap;gap:2px}
.meta-sep{color:var(--border3);margin:0 7px}
.meta-label{color:var(--text3)}
.meta-val{font-weight:600;color:var(--text)}
.desc-box{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;font-size:13px;color:var(--text2);line-height:1.8;min-height:52px}
.strip-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.profile-strip{display:flex;gap:5px;flex-wrap:wrap}
.pthumb{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:opacity 0.12s}
.pthumb:hover{opacity:0.8}
.pthumb.unavail{opacity:0.2;cursor:default;pointer-events:none}
.pthumb-img{width:50px;height:50px;object-fit:contain;border-radius:7px;border:2px solid var(--border3);background:var(--bg2);display:block;transition:border-color 0.12s}
.pthumb-img.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.pthumb-ph{width:50px;height:50px;border-radius:7px;border:1.5px dashed var(--border3);background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--text4);font-size:9px}
.pthumb-label{font-size:9px;color:var(--text3)}
.state-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border3);background:var(--bg3);color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background 0.1s}
.state-btn:hover{background:var(--border);color:var(--text)}

/* 스텟 테이블 */
.stat-section{display:none;border-top:1px solid var(--border)}
.stat-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg2)}
.stat-table th{background:var(--bg3);padding:8px 12px;text-align:center;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border)}
.stat-table td{padding:8px 12px;text-align:center;color:var(--text);border-bottom:0.5px solid var(--border2)}
.stat-table tbody tr:last-child td{border-bottom:none}
.stat-table tbody tr:hover td{background:var(--bg3)}
.stat-table .row-label{text-align:left;font-weight:500;color:var(--text2);width:80px}
.stat-nil{color:var(--text4)}

/* 속성 배지 */
.eb-땅{background:#fff3e0;color:#e65100}.eb-물{background:#e3f2fd;color:#1565c0}
.eb-불{background:#fce4ec;color:#b71c1c}.eb-바람{background:#e8f5e9;color:#1b5e20}
.eb-빛{background:#fffde7;color:#f57f17}.eb-어둠{background:#ede7f6;color:#4a148c}
.eb-황혼{background:#fdf2f8;color:#880e4f}.eb-여명{background:#fff8e1;color:#6d4c41}
.eb-악몽{background:#f3e5f5;color:#6a1b9a}

/* 페이지네이션 */
#pagination{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:4px;padding:10px 16px;flex-wrap:nowrap;background:var(--bg2);border-top:1px solid var(--border);z-index:100}
.pg-btn{min-width:34px;height:34px;padding:0 6px;border-radius:6px;border:1px solid var(--border3);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all 0.12s}
.pg-btn:hover{border-color:var(--accent-border);color:var(--text)}
.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.pg-btn.disabled{opacity:0.25;cursor:default;pointer-events:none}
@media(max-width:640px){
  .pg-btn{min-width:26px;height:30px;font-size:12px;padding:0 4px}
  #pagination{gap:3px;padding:8px 10px}
}

@media(max-width:620px){
  .entry-body{flex-direction:column;align-items:center;padding:14px}
  .img-box{width:160px;min-height:160px}
  .main-img,.main-img-ph{width:140px;height:140px}
  .name-meta{flex-direction:column;gap:5px}
  .pthumb-img,.pthumb-ph{width:42px;height:42px}
}
</style>
</head>

// 형식: "드래곤이름": { 단계인덱스: { atk:[lo,hi,max_lo,max_hi], def:[...], hp:[...] } }
// dexStatMap → stat.js 에서 로드
// dexDescMap → desc.js 에서 로드



const PER_PAGE = 10;
const params = new URLSearchParams(window.location.search);
let curPageNum = Math.max(1, parseInt(params.get("p") || sessionStorage.getItem("dv1_page") || "1"));

// 필터 상태
let filterName = "";
let filterElems = new Set();
let filterTypes = new Set();
const ELEMS = ["땅","물","불","바람","빛","어둠","황혼","여명","악몽"];
const TYPES = ["체력","공격","방어","체공","체방","공방","중립"];

function getFiltered(){
  return dexData.filter(d => {
    if(filterName && !d.n.includes(filterName)) return false;
    if(filterElems.size > 0 && !filterElems.has(d.e)) return false;
    if(filterTypes.size > 0 && !filterTypes.has(d.t)) return false;
    return true;
  });
}

function buildFilterUI(){
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";

  const line1 = document.createElement("div"); line1.className = "filter-line";
  const line2 = document.createElement("div"); line2.className = "filter-line";

  const lbl = (t, target) => {
    const s=document.createElement("span"); s.className="filter-label"; s.textContent=t; target.appendChild(s);
  };

  lbl("속성", line1);
  ELEMS.forEach(v => {
    const b=document.createElement("button");
    b.className="ftag"+(filterElems.has(v)?" active":"");
    const icon=dexElemIcons[v];
    if(icon){ const img=document.createElement("img"); img.src=icon; img.alt=v; b.appendChild(img); }
    b.appendChild(document.createTextNode(v));
    b.onclick=()=>{ filterElems.has(v)?filterElems.delete(v):filterElems.add(v); onFilter(); };
    line1.appendChild(b);
  });

  lbl("타입", line2);
  TYPES.forEach(v => {
    const b=document.createElement("button");
    b.className="ftag"+(filterTypes.has(v)?" active":"");
    b.textContent=v;
    b.onclick=()=>{ filterTypes.has(v)?filterTypes.delete(v):filterTypes.add(v); onFilter(); };
    line2.appendChild(b);
  });

  fr.appendChild(line1);
  fr.appendChild(line2);
}

function onFilter(){
  filterName = document.getElementById("search-input").value.trim();
  curPageNum = 1;
  sessionStorage.setItem("dv1_page", 1);
  renderAll();
}

// 엔트리별 현재 선택 단계 저장
const stageState = {};

function getN(name){
  const d = dexData.find(x => x.n === name);
  return d && d.id ? String(d.id) : null;
}
const BASE = "https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main";

// 썸네일: dragon/{N}/profile/{stage}.png
function profileUrl(name, stage){
  const n = getN(name);
  return n ? `${BASE}/dragon/${n}/profile/${stage}.png` : "";
}
// 풀 이미지: dragon/{N}/{filename}.png
function fullUrl(name, stage){
  const n = getN(name);
  const f = STAGE_FILES[stage];
  return (n && f) ? `${BASE}/dragon/${n}/${f}.png` : "";
}
function stageAvail(d, i){
  if(i===6 && !d.aw) return false;
  if(i===7 && !d.tr) return false;
  if(i===8 && !d.ad) return false;
  return true;
}
function highStage(d){ return d.ad?"강림":d.tr?"초월":d.aw?"각성":"성체"; }

// ── 전체 렌더 ──
function renderAll(){
  buildFilterUI();
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  curPageNum = Math.min(curPageNum, totalPages || 1);
  const pageData = filtered.slice((curPageNum-1)*PER_PAGE, curPageNum*PER_PAGE);

  document.getElementById("top-title").textContent =
    `드래곤 도감 (${filtered.length}마리)`;

  const container = document.getElementById("entries");
  container.innerHTML = "";
  container.style.animation = "none";
  container.offsetHeight; // reflow
  container.style.animation = "";
  pageData.forEach(d => {
    const globalIdx = dexData.indexOf(d);
    if(stageState[globalIdx] === undefined) stageState[globalIdx] = 4;
    container.appendChild(buildEntry(d, globalIdx));
  });
  buildPagination(filtered.length, totalPages);
}

function buildEntry(d, idx){
  const wrap = document.createElement("div");
  wrap.className = "dragon-entry";
  wrap.dataset.idx = idx;

  const initFull = fullUrl(d.n, 4);

  wrap.innerHTML = `
    <div class="entry-body">
      <div class="img-box">
        <img class="main-img" id="mimg-${idx}"
          src="${initFull}"
          alt="${d.n}"
          onerror="this.style.display='none';document.getElementById('mph-${idx}').style.display='flex'"
          style="${initFull?'':'display:none'}">
        <div class="main-img-ph" id="mph-${idx}" style="${initFull?'display:none':'display:flex'}">이미지 없음</div>
      </div>
      <div class="info-panel">
        <div class="name-meta">
          <div class="dragon-name">${d.n}</div>
          <div class="meta-row">
            <span class="meta-label">속성</span>&nbsp;<span class="meta-val eb-${d.e}" style="padding:1px 6px;border-radius:4px;font-size:11px;display:inline-flex;align-items:center;gap:3px">${dexElemIcons[d.e]?`<img src="${dexElemIcons[d.e]}" style="width:14px;height:14px;border-radius:2px">`:''}${d.e}</span>
            <span class="meta-sep">|</span>
            <span class="meta-label">타입</span>&nbsp;<span class="meta-val">${d.t_kr}</span>
            <span class="meta-sep">|</span>
            <span class="meta-label">세대</span>&nbsp;<span class="meta-val">${d.gen||"1"}</span>
            <span class="meta-sep">|</span>
            <span class="meta-label">단계</span>&nbsp;<span class="meta-val" id="mstage-${idx}">성체</span>
            <span class="meta-sep">|</span>
            <span class="meta-label">레벨업</span>&nbsp;<span class="meta-val">${d.lv?'가능':'불가'}</span>
            <span class="meta-sep">|</span>
            <span class="meta-label">코드화</span>&nbsp;<span class="meta-val">${d.cd}</span>
          </div>
        </div>
        <div class="desc-box" style="${(typeof dexDescMap!=='undefined'&&dexDescMap[d.n])||d.desc?'':'font-style:italic'}">${(typeof dexDescMap!=='undefined'&&dexDescMap[d.n])||d.desc||'(설명 데이터가 아직 없습니다)'}</div>
        <div class="strip-row">
          <div class="profile-strip" id="strip-${idx}"></div>
          <button class="state-btn" id="sbtn-${idx}" onclick="toggleStat(${idx})">State펼치기 ▼</button>
        </div>
      </div>
    </div>
    <div class="stat-section" id="stat-${idx}">
      <table class="stat-table">
        <thead>
          <tr>
            <th class="row-label"></th>
            <th>1레벨</th>
            <th>45레벨</th>
            <th>성장폭</th>
          </tr>
        </thead>
        <tbody id="stbody-${idx}"></tbody>
      </table>
    </div>`;

  // 프로필 스트립 구성
  const strip = wrap.querySelector(`#strip-${idx}`);
  STAGES.forEach(s => {
    const avail = stageAvail(d, s.i);
    const pUrl = profileUrl(d.n, s.i);
    const fallbackUrl = profileUrl(d.n, 4); // 성체 프로필 폴백
    const thumbWrap = document.createElement("div");
    thumbWrap.className = "pthumb" + (avail ? "" : " unavail");
    thumbWrap.dataset.si = s.i;

    if(pUrl){
      const img = document.createElement("img");
      img.className = "pthumb-img" + (s.i === 4 ? " sel" : "");
      // 성체(4)는 dexImgMap 이미지로 폴백, 나머지는 플레이스홀더
      img.src = pUrl;
      img.alt = s.l;
      img.onerror = function(){
        if(s.i === 5){
          this.closest(".pthumb").style.display = "none";
        } else {
          this.style.display = "none";
          const ph = document.createElement("div");
          ph.className = "pthumb-ph"; ph.textContent = s.l[0];
          this.parentNode.insertBefore(ph, this);
        }
      };
      thumbWrap.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "pthumb-ph"; ph.textContent = s.l[0];
      thumbWrap.appendChild(ph);
    }
    const lbl = document.createElement("span");
    lbl.className = "pthumb-label"; lbl.textContent = s.l;
    thumbWrap.appendChild(lbl);

    if(avail) thumbWrap.onclick = () => selectStage(d, idx, s.i);
    strip.appendChild(thumbWrap);
  });

  return wrap;
}

function selectStage(d, idx, si){
  stageState[idx] = si;
  document.getElementById("mstage-" + idx).textContent = STAGES.find(s=>s.i===si).l;

  // 큰 이미지 교체
  const mi = document.getElementById("mimg-" + idx);
  const mp = document.getElementById("mph-" + idx);
  const fUrl = fullUrl(d.n, si);
  if(fUrl){
    mi.src = fUrl; mi.style.display = "block"; mp.style.display = "none";
    mi.onerror = () => { mi.style.display = "none"; mp.style.display = "flex"; };
  } else {
    mi.style.display = "none"; mp.style.display = "flex";
  }

  // 썸네일 sel 업데이트
  document.querySelectorAll(`#strip-${idx} .pthumb-img`).forEach(img => {
    img.classList.toggle("sel", parseInt(img.closest(".pthumb").dataset.si) === si);
  });
  const statSec = document.getElementById("stat-" + idx);
  if(statSec && statSec.style.display !== "none") renderStat(d, idx, si);
}

function toggleStat(idx){
  const d = dexData[idx];
  const sec = document.getElementById("stat-" + idx);
  const btn = document.getElementById("sbtn-" + idx);
  const isOpen = sec.style.display !== "none";
  sec.style.display = isOpen ? "none" : "block";
  btn.textContent = isOpen ? "State펼치기 ▼" : "State닫기 ▲";
  if(!isOpen) renderStat(d, idx, stageState[idx] || 4);
}

function renderStat(d, idx, si){
  const tbody = document.getElementById("stbody-" + idx);
  const ss = dexStatMap[d.n] || null;
  tbody.innerHTML = [
    {label:"공격력", key:"atk"},
    {label:"방어력", key:"def"},
    {label:"체력",   key:"hp"},
  ].map(r => {
    const s = ss ? ss[r.key] : null;
    if(!s) return `<tr>
      <td class="row-label">${r.label}</td>
      <td class="stat-nil">-</td><td class="stat-nil">-</td><td class="stat-nil">-</td></tr>`;
    const lv45 = s[0] + Math.round(s[1] * 44);
    return `<tr>
      <td class="row-label">${r.label}</td>
      <td>${s[0]}</td><td>${lv45}</td><td>${s[1]}</td></tr>`;
  }).join("");
}

function buildPagination(total, totalPages){
  const pg = document.getElementById("pagination");
  pg.innerHTML = "";
  if(totalPages <= 1) return;
  const isMobile = window.innerWidth < 640;
  const GROUP = isMobile ? 5 : 10;
  const groupStart = Math.floor((curPageNum - 1) / GROUP) * GROUP + 1;
  const groupEnd = Math.min(groupStart + GROUP - 1, totalPages);

  const btn = (label, targetPage, isActive, isDisabled) => {
    const a = document.createElement("a");
    a.className = "pg-btn" + (isActive ? " active" : "") + (isDisabled ? " disabled" : "");
    a.textContent = label;
    if(!isDisabled && !isActive){
      a.href = "javascript:void(0)";
      a.onclick = () => { curPageNum = targetPage; sessionStorage.setItem("dv1_page", targetPage); renderAll(); };
    }
    pg.appendChild(a);
  };

  if(!isMobile) btn("«", 1, false, curPageNum === 1);
  btn("‹", Math.max(1, groupStart - GROUP), false, groupStart === 1);
  for(let p = groupStart; p <= groupEnd; p++) btn(p, p, p === curPageNum, false);
  btn("›", Math.min(totalPages, groupStart + GROUP), false, groupEnd === totalPages);
  if(!isMobile) btn("»", totalPages, false, curPageNum === totalPages);
}

// 테마 동기화
(function(){
  var link=document.getElementById("theme-css");
  if(!link)return;
  var sync=function(){
    var c=document.getElementById("custom-theme-style");
    if(c&&c.textContent&&c.textContent.length>0){document.documentElement.removeAttribute("data-theme");return;}
    var m=String(link.href||"").match(/theme-(dark|light|beige)\.css/);
    document.documentElement.setAttribute("data-theme",m?m[1]:"dark");
  };
  sync();
  new MutationObserver(sync).observe(link,{attributes:true,attributeFilter:["href"]});
  new MutationObserver(sync).observe(document.head,{childList:true,subtree:true,characterData:true});
})();

renderAll();
</script>
</body>
</html>
