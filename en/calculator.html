<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Village 1 B-Val Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<link id="theme-css" rel="stylesheet" href="./theme-dark.css">
<script src="./theme.js"></script>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nanum Gothic',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.hd{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--sf);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.hd-icon{font-size:26px}.hd-t{font-size:15px;font-weight:800;color:var(--gold)}.hd-s{font-size:11px;color:var(--dim);margin-top:2px}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:50px;z-index:99}
.tab-btn{flex:1;padding:12px 20px;background:none;border:none;border-bottom:3px solid transparent;color:var(--dim);font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tc{display:none}.tc.active{display:block}
.ti{max-width:100%;padding:14px 24px}.ti-sim{max-width:1200px;margin:0 auto;padding:14px 24px}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:14px;overflow:hidden}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.sec-bd{padding:14px 16px}
select,input[type=number],input[type=text]{background:var(--sf2);border:1px solid var(--bd);color:var(--text);padding:5px 9px;border-radius:5px;font-family:'Nanum Gothic',sans-serif;font-size:13px}
select:focus,input:focus{outline:none;border-color:var(--gold)}
select:disabled,input:disabled{opacity:.3;cursor:not-allowed}
.acc-srch{width:100%;padding:8px 12px;margin-bottom:10px;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--text);font-family:'Nanum Gothic',sans-serif;font-size:13px}
.acc-srch:focus{outline:none;border-color:var(--gold)}
.acc-list{max-height:260px;overflow-y:auto;padding-right:2px}
.acc-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:4px}
.acc-row:hover{background:var(--sf2)}
.acc-row input[type=checkbox]{accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.acc-row label{flex:1;cursor:pointer;font-size:13px}
.acc-st{font-size:11px;min-width:68px}
.acc-card{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;margin-bottom:8px}
.acc-card-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.acc-search-wrap{position:relative;flex:1;min-width:140px}
.acc-search-input{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--text);padding:5px 9px;border-radius:5px;font-family:'Nanum Gothic',sans-serif;font-size:13px}
.acc-search-input:focus{outline:none;border-color:var(--gold)}
.acc-search-input::placeholder{color:var(--dimmer)}
.acc-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--sf2);border:1px solid var(--gold);border-radius:5px;max-height:200px;overflow-y:auto;z-index:200;margin-top:2px;display:none}
.acc-dropdown.open{display:block}
.acc-drop-item{padding:6px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--text);font-family:'Nanum Gothic',sans-serif}
.acc-drop-item:hover{background:rgba(232,184,75,.12)}
.acc-drop-item.focused{background:rgba(232,184,75,.2);outline:none}
.acc-drop-name{flex:1}
.acc-preset-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;padding:10px 16px;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.015)}
.acc-preset-row button{padding:6px 4px}
.gem-grid{display:grid;grid-template-columns:42px repeat(3,1fr);gap:6px;align-items:center}
.gem-hdr{font-size:11px;color:var(--dim);text-align:center}
.gem-lbl{font-weight:800;font-size:13px}
.gem-grid input{width:100%;text-align:center;padding:5px;font-size:13px}
.gem-grid input[type=number]::-webkit-outer-spin-button,.gem-grid input[type=number]::-webkit-inner-spin-button{-webkit-appearance:auto!important;margin:0}
.gem-grid input[type=number]{-moz-appearance:number-input!important}
.pcard{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:12px;margin-bottom:10px}
.pcard-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.popt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.popt-idx{color:var(--dim);min-width:22px;font-size:11px}
.sp-top{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.fg label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.fg select,.fg input{width:100%}
.sp-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sp-ocard{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:5px}
.sp-ocard.dis{opacity:.3}
.sp-onum{color:var(--gold);font-size:11px;font-weight:800;min-width:18px}
.sp-ocard select{flex:1;font-size:12px}
.sp-oval{color:var(--green);font-size:11px;min-width:46px;text-align:right}
.sp-preset-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-bottom:10px}
.sp-preset-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:6px 8px;color:var(--text);cursor:pointer;font-family:'Nanum Gothic',sans-serif;text-align:center;transition:all .15s;min-height:34px;white-space:nowrap}
.sp-preset-btn:hover{border-color:var(--gold);background:rgba(232,184,75,.08)}
.sp-preset-btn.active{border-color:var(--gold);background:rgba(232,184,75,.14)}
.sp-preset-name{display:block;font-size:12px;font-weight:800;color:var(--gold)}
.sp-preset-desc{display:block;font-size:11px;color:var(--text);margin-left:0}
.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.coll-g label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
.coll-g input{width:100%;text-align:center}
.btn-white{background:none;border:1px solid var(--text);color:var(--text);padding:6px 13px;border-radius:5px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700}
.btn-white:hover{background:rgba(255,255,255,.1)}
.btn-gold{background:none;border:1px solid var(--gold);color:var(--gold);padding:6px 13px;border-radius:5px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700}
.btn-gold:hover{background:rgba(232,184,75,.1)}
.btn-red{background:none;border:1px solid var(--red);color:var(--red);padding:3px 9px;border-radius:4px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:12px}
.btn-reset{background:none;border:1px solid var(--red);color:var(--red);padding:6px 13px;border-radius:5px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700}
.btn-reset:hover{background:rgba(248,113,113,.1)}
.btn-save{background:var(--gold);border:none;color:#0a0c18;padding:10px 28px;border-radius:6px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:800}
.btn-save:hover{background:var(--gold2)}
.save-row{display:flex;align-items:center;justify-content:flex-end;gap:14px;margin-top:4px}
.save-msg{font-size:12px;color:var(--green)}
.sim-cfg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cfg-lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:7px}
.btn-grp{display:flex;gap:4px}
.btn-grp button{flex:1;padding:8px 4px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;color:var(--dim);cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;transition:all .15s}
.btn-grp button.active{background:rgba(232,184,75,.12);border-color:var(--gold);color:var(--gold)}
.radio-opts label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;margin-bottom:5px}
.radio-opts input[type=radio]{accent-color:var(--gold)}
.btn-sim{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold2),var(--gold));border:none;border-radius:8px;color:#0a0c18;font-family:'Nanum Gothic',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin:12px 0;letter-spacing:-.5px;transition:opacity .15s,transform .1s}
.btn-sim:hover{opacity:.92}.btn-sim:active{transform:scale(.99)}.btn-sim:disabled{opacity:.5;cursor:not-allowed}
.res-wrap{overflow-x:auto}
table.rtbl{width:100%;border-collapse:collapse;min-width:640px}
.rtbl th{background:var(--sf2);padding:9px 11px;text-align:left;font-size:11px;color:var(--dim);border-bottom:1px solid var(--bd);white-space:nowrap}
.rtbl td{padding:10px 11px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
.rtbl tr:last-child td{border-bottom:none}
.rtbl tbody tr:hover td{background:rgba(255,255,255,.015)}
.td-pc{display:table-cell}.td-mob{display:none}
.mob-only{display:none}
.acc-name-short{display:none}.pend-name-short{display:none}
@media(max-width:600px){
  .res-wrap{overflow-x:hidden}
  table.rtbl{display:block;width:100%!important;min-width:0!important;box-sizing:border-box}
  .rtbl thead{display:none}
  .rtbl tbody{display:block;width:100%}
  .rtbl tbody tr{display:block;width:100%;border-bottom:1px solid var(--bd);padding:0;box-sizing:border-box}
  .rtbl tbody td{display:block;width:100%;box-sizing:border-box}
  .td-pc{display:none!important}
  .td-mob{display:block!important;padding:0;width:100%!important;box-sizing:border-box}
  .mob-card{padding:14px 16px;border-bottom:2px solid var(--bd2);width:100%;box-sizing:border-box}
  .acc-name-full{display:none}.acc-name-short{display:inline}
  .pend-name-full{display:none}.pend-name-short{display:inline}
  .mob-row1{display:flex;align-items:center;gap:12px;margin-bottom:10px;width:100%}
  .mob-rank{font-size:22px;flex-shrink:0;width:28px;text-align:center}
  .mob-acc-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .mob-acc-text{min-width:0}
  .mob-acc-name{font-weight:800;font-size:14px;line-height:1.3}
  .mob-bv{font-family:"Courier New",monospace;font-size:18px;font-weight:800;color:var(--gold);white-space:nowrap;flex-shrink:0}
  .mob-row2{width:100%;margin-bottom:8px;padding-top:8px;border-top:1px solid var(--bd)}
  .mob-row3{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;width:100%}
  .mob-pend{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
  .mob-stats{font-family:"Courier New",monospace;font-size:12px;white-space:nowrap;color:var(--text2)}
  .avg-mob-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;flex-wrap:wrap;gap:8px}
  .mob-only{display:block!important}
  .pc-only{display:none!important}
  td.mob-only{display:block!important}
}
.medal{font-size:20px}.rank-n{font-weight:800;color:var(--dim)}
.dtype-b{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:800;border:1px solid}
.bv-cell{font-family:'Courier New',monospace;font-size:14px;font-weight:800;color:var(--gold);white-space:nowrap}
.st-cell{font-family:'Courier New',monospace;font-size:12px;white-space:nowrap}
.gem-tags{display:flex;flex-wrap:wrap;gap:3px}
.gem-tag{padding:2px 6px;border-radius:3px;font-size:11px;font-weight:700;background:rgba(255,255,255,.07)}
.enc-b{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;font-weight:700;border:1px solid var(--green);color:var(--green);background:rgba(74,222,128,.1)}
.enc-none{border-color:var(--dimmer);color:var(--dimmer);background:none}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.spec-layout{display:flex;flex-direction:column;gap:36px;align-items:stretch}
.spec-spirit{width:100%;display:flex;justify-content:center}
.spec-spirit .sec{margin-bottom:0;width:100%;max-width:760px}
.spec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.spec-col{display:flex;flex-direction:column;gap:14px}
.spec-col .sec{margin-bottom:0}
@media(max-width:1100px) and (min-width:701px){.spec-grid{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.spec-grid{grid-template-columns:1fr}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@media(max-width:580px){.sim-cfg{grid-template-columns:1fr}.sp-top{grid-template-columns:1fr}.sp-opts{grid-template-columns:1fr}.sp-preset-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.sp-preset-btn{white-space:normal}}
.res-tab-btn{padding:9px 18px;background:none;border:none;border-bottom:3px solid transparent;color:var(--dim);font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.res-tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

[data-theme="dark"]{
  --bg:#0e1116;--bg2:#161a22;--bg3:#1c212c;
  --border:#23293a;--border2:#1b1f2a;--border3:#2d3447;
  --text:#eaecf2;--text2:#b3b9c7;--text3:#7d8597;--text4:#565d6e;
  --accent:#7aa2f7;--accent-bg:rgba(122,162,247,0.12);--accent-border:rgba(122,162,247,0.30);
}
[data-theme="light"]{
  --bg:#f7f7f8;--bg2:#ffffff;--bg3:#f1f2f4;
  --border:#e6e7ea;--border2:#eeeff2;--border3:#d4d6db;
  --text:#15171c;--text2:#4a4d57;--text3:#71757f;--text4:#9aa0aa;
  --accent:#2f6fed;--accent-bg:rgba(47,111,237,0.10);--accent-border:rgba(47,111,237,0.32);
}
[data-theme="beige"]{
  --bg:#f3ecdd;--bg2:#faf3e2;--bg3:#ebe0c7;
  --border:#d8caa8;--border2:#e1d4b3;--border3:#c0ad84;
  --text:#2a2316;--text2:#5a4e34;--text3:#837553;--text4:#a99971;
  --accent:#b06a1e;--accent-bg:rgba(176,106,30,0.10);--accent-border:rgba(176,106,30,0.32);
}
/* spec 커스텀 변수 → 테마 변수로 매핑 */
:root{
  --sf:var(--bg2);--sf2:var(--bg3);--bd:var(--border);
  --gold:var(--accent);--gold2:var(--accent);
  --dim:var(--text3);--dimmer:var(--text4);
  --red:#f87171;--green:#4ade80;--blue:#60a5fa;
  --hpc:#fbbf24;--atc:#f87171;--dfc:#60a5fa;
}

/* ── 스펙 View only ── */
.sv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.sv-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(100,200,100,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);font-weight:800}
.sv-edit-btn{background:none;border:1px solid var(--gold);color:var(--gold);padding:7px 16px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;text-decoration:none;display:inline-block;transition:background .15s}
.sv-edit-btn:hover{background:var(--accent-bg)}
.sv-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sv-sec{background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:14px}
.sv-sec-hd{padding:9px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.sv-sec-bd{padding:12px 14px}
.sv-gem-table{width:100%;border-collapse:collapse;font-size:13px}
.sv-gem-table th{font-size:10px;color:var(--dim);padding:4px 8px;text-align:center;border-bottom:1px solid var(--bd)}
.sv-gem-table td{padding:5px 8px;text-align:center;border-bottom:1px solid var(--bd);font-size:12px}
.sv-gem-table tr:last-child td{border-bottom:none}
.sv-gem-hp{color:#fbbf24}.sv-gem-atk{color:#f87171}.sv-gem-def{color:#60a5fa}
.sv-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:12px}
.sv-item:last-child{border-bottom:none}
.sv-item-img{width:28px;height:28px;object-fit:contain;border-radius:3px;flex-shrink:0}
.sv-item-name{flex:1}
.sv-enc{font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid;font-weight:800}
.sv-coll-row{display:flex;justify-content:space-around;padding:8px 0;font-size:13px;font-weight:700}
.sv-empty{color:var(--dimmer);font-style:italic;font-size:12px;padding:8px 0;text-align:center}
/* 스펙 요약 (시뮬 탭) */
.spec-summary{background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:14px;overflow:hidden}
.spec-summary-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.spec-summary-bd{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.ss-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.7}
.ss-lbl{color:var(--dim);flex-shrink:0;width:52px;font-size:11px;font-weight:700;padding-top:1px}
.ss-val{color:var(--text);flex:1;word-break:break-all}
.ss-empty{color:var(--dimmer);font-style:italic}
.ss-gem-hp{color:#fbbf24}.ss-gem-atk{color:#f87171}.ss-gem-def{color:#60a5fa}
.ss-edit-btn{background:none;border:1px solid var(--gold);color:var(--gold);padding:4px 12px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;white-space:nowrap;transition:background .15s}
.ss-edit-btn:hover{background:var(--accent-bg)}
@media(max-width:700px){.sv-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hd">
  <a href="./index.html?tab=calculator" style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--text2);text-decoration:none;font-size:16px;flex-shrink:0;transition:all 0.15s" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--bd)';this.style.color='var(--text2)'">←</a>
  <div class="hd-icon">🐉</div>
  <div><div class="hd-t">Dragon Village 1 Spirit Simulator</div><div class="hd-s">B-Val (HP × ATK × DEF) optimization</div></div>
  <div style="margin-left:auto;font-size:12px;color:var(--text);text-align:right">Made by Nix<br>
</div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-btn-spec" onclick="switchTab('spec')">My Spec</button>
  <button class="tab-btn" id="tab-btn-sim" onclick="switchTab('sim')">Simulator</button>
</div>

<!-- ■ My Spec 탭 (View only) -->
<div id="tab-spec" class="tc active"><div class="ti">
  <div class="spec-spirit" id="spec-spirit-wrap">
    <div class="sec">
      <div class="sec-hd">
        <span>✨ Spirit</span>
        <button class="btn-reset" onclick="resetSpirit()">↺</button>
      </div>
      <div class="sec-bd" id="sp-bd"></div>
    </div>
  </div>
  <div id="spec-view-wrap"><!-- renderSpecView()로 채워짐 --></div>
</div></div>

<!-- ■ Simulator 탭 -->
<div id="tab-sim" class="tc"><div class="ti ti-sim">

  <div class="sec">
    <div class="sec-hd">⚙ Simulation Settings</div>
    <div class="sec-bd">
      <div class="sim-cfg">
        <div>
          <div class="cfg-lbl">Dragon Grade</div>
          <div class="btn-grp" id="grd-grp">
            <button onclick="setGrade('7.0')">7.0</button>
            <button onclick="setGrade('8.0')">8.0</button>
            <button class="active" onclick="setGrade('9.0')">9.0</button>
          </div>
        </div>
        <div>
          <div class="cfg-lbl">Buff Level</div>
          <div class="btn-grp" id="buf-grp">
            <button onclick="setBuf(0)">Buff 0</button>
            <button onclick="setBuf(1)">Buff 1</button>

function getAccNum(name){
  const m=name.match(/\+(\d+)/)||name.match(/(\d+)\s*$/);
  return m?parseInt(m[1]):0;
}
function getAccType(name){
  for(let i=0;i<ACC_TYPE_ORDER.length;i++){
    const type=ACC_TYPE_ORDER[i];
    if(name.startsWith(type)||name.includes(`(${type})`))return i;
  }
  return 99;
}
function sortAccCards(){
  S.accCards=S.accCards.map((c,i)=>({...c,_idx:i}));
  S.accCards.sort((a,b)=>{
    const numA=getAccNum(a.name||''),numB=getAccNum(b.name||'');
    if(numB!==numA)return numB-numA;
    const typeA=getAccType(a.name||''),typeB=getAccType(b.name||'');
    if(typeA!==typeB)return typeA-typeB;
    const encA=ENC_ORDER[a.enchant]??3,encB=ENC_ORDER[b.enchant]??3;
    if(encA!==encB)return encA-encB;
    return a._idx-b._idx;
  });
  S.accCards=S.accCards.map(({_idx,...c})=>c);
}
function getPendOrder(type){return type==='태양'?0:type==='달'?1:2;}
function getPendSum(p){
  const mo=p.type==='태양'?3:p.type==='달'?2:1;
  return p.options.slice(0,mo).reduce((s,o)=>s+(o.val||0),0);
}
function sortPendants(){
  S.pendants=S.pendants.map((p,i)=>({...p,_idx:i}));
  S.pendants.sort((a,b)=>{
    const oA=getPendOrder(a.type),oB=getPendOrder(b.type);
    if(oA!==oB)return oA-oB;
    const sA=getPendSum(a),sB=getPendSum(b);
    if(sB!==sA)return sB-sA;
    return a._idx-b._idx;
  });
  S.pendants=S.pendants.map(({_idx,...p})=>p);
}

function closeAccDrop(ci,el){
  const drop=document.getElementById('acc-drop-'+ci);
  if(!drop)return;
  drop.classList.remove('open');
  const sec=drop.closest('.sec');
  if(sec)sec.style.overflow='';
  if(el){
    const valid=ACC_DB.some(a=>a.n===el.value);
    if(!valid){
      S.accCards[ci].name='';
      S.accCards[ci].enchant='none';
      el.value='';
      qSave();

function accNavKey(e,ci){
  const drop=document.getElementById('acc-drop-'+ci);
  if(!drop||!drop.classList.contains('open'))return;
  const items=[...drop.querySelectorAll('.acc-drop-item')];
  if(!items.length)return;
  const cur=drop.querySelector('.acc-drop-item.focused');
  let idx=items.indexOf(cur);
  if(e.key==='ArrowDown'){
    e.preventDefault();
    idx=Math.min(idx+1,items.length-1);
    items.forEach(el=>el.classList.remove('focused'));
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({block:'nearest'});
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    idx=Math.max(idx-1,0);
    items.forEach(el=>el.classList.remove('focused'));
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({block:'nearest'});
  }else if(e.key==='Enter'){
    e.preventDefault();
    if(cur)cur.dispatchEvent(new MouseEvent('mousedown'));
  }else if(e.key==='Escape'){
    closeAccDrop(ci);
  }
}

function filterAccDrop(ci,q){
  const drop=document.getElementById('acc-drop-'+ci);

  let filtered=statOnly?ACC_DB.filter(a=>!a.n.startsWith('Horn of light')):ACC_DB;
  if(kw)filtered=filtered.filter(a=>a.n.toLowerCase().includes(kw));
  drop.innerHTML=filtered.slice(0,30).map(a=>
    `<div class="acc-drop-item" onmousedown="selectAcc(${ci},'${a.n.replace(/'/g,"\'")}')">
      <span class="acc-drop-name">${a.n}</span>

  ).join('');
  drop.classList.add('open');
}

    if(lvs.length)gemP.push(`<span class="${SKC[stat]}">${SKL[stat]}${lvs.length}(${lvs.join(',')})</span>`);
  }
  const accs=S.accCards||[];

  const byAcc={};
  accs.forEach(c=>{if(!c.name)return;const k=c.name+(c.enchant&&c.enchant!=='none'?'['+ENC_LBL[c.enchant]+']':'');byAcc[k]=(byAcc[k]||0)+1;});
  const accP=Object.entries(byAcc).map(([k,n])=>n>1?`${k} ×${n}`:k);
  const pends=S.pendants||[];
  const PEND_LBL2={달:'Moon',태양:'Sun',별:'Star'};
  const byPend={};
  pends.forEach(p=>{
    if(!p.type)return;
    const mo=p.type==='태양'?3:p.type==='달'?2:1;
    const opts=(p.options||[]).slice(0,mo).filter(o=>o&&o.stat).map(o=>`${o.stat==='hp'?'HP':o.stat==='atk'?'ATK':'DEF'}${o.val||0}%`).join('/');
    const k=(PEND_LBL2[p.type]||p.type)+(opts?` (${opts})`:'');
    byPend[k]=(byPend[k]||0)+1;
  });
  const pendP=Object.entries(byPend).map(([k,n])=>n>1?`${k} ×${n}`:k);
  const col=S.coll||{hp:0,atk:0,def:0};
  const colP2=[];
  if(col.hp)colP2.push(`<span class="ss-gem-hp">HP+${col.hp}</span>`);
  if(col.atk)colP2.push(`<span class="ss-gem-atk">ATK+${col.atk}</span>`);
  if(col.def)colP2.push(`<span class="ss-gem-def">DEF+${col.def}</span>`);
  el.innerHTML=`<div class="spec-summary"><div class="spec-summary-hd"><span>📋 Current Spec</span><button class="ss-edit-btn" onclick="switchTab('spec')">✏️ Edit Spec</button></div><div class="spec-summary-bd"><div class="ss-row"><span class="ss-lbl">💎 Gem</span><span class="ss-val">${gemP.length?gemP.join(' '):'<span class="ss-empty">None</span>'}</span></div><div class="ss-row"><span class="ss-lbl">💍 Accessory</span><span class="ss-val">${accP.length?accP.join('<br>'):'<span class="ss-empty">None</span>'}</span></div><div class="ss-row"><span class="ss-lbl">🌙 Pendant</span><span class="ss-val">${pendP.length?pendP.join('<br>'):'<span class="ss-empty">None</span>'}</span></div><div class="ss-row"><span class="ss-lbl">📚 Collection</span><span class="ss-val">${colP2.length?colP2.join(' · '):'<span class="ss-empty">0</span>'}</span></div></div></div>`;
}

// 보유 Gem을 풀(pool)로 변환. 각 원소: {s:Stat, lv:단계, cnt:보유수, h:체기여, a:공기여, d:방기여}
function buildPool(){
  const pool=[];
  for(const s of SKEYS)for(const lv of [37,38,39,40]){
    const cnt=S.gems[s]?.[lv]||0;
    if(cnt>0)pool.push({s,lv,cnt,h:s==='hp'?GEM[lv].hp:0,a:s==='atk'?GEM[lv].atk:0,d:s==='def'?GEM[lv].def:0});
  }
  for(const s of SKEYS){
    const lv=FALLBACK_GEM_LV;
    pool.push({s,lv,cnt:FALLBACK_GEM_COUNT,h:s==='hp'?GEM[lv].hp:0,a:s==='atk'?GEM[lv].atk:0,d:s==='def'?GEM[lv].def:0});
  }
  return pool;
}

// 5슬롯 Gem Allocation 경우의 수 열거 (백트래킹). 반환: [[각 풀 원소 사용 개수], ...]
function genAllocs(pool,slots){
  const total=pool.reduce((s,g)=>s+g.cnt,0);
  const maxS=Math.min(slots,total);
  const res=[];
  const cur=new Array(pool.length).fill(0);
  function bt(i,rem){
    if(i===pool.length){if(rem===0)res.push([...cur]);return;}
    for(let k=0;k<=Math.min(pool[i].cnt,rem);k++){cur[i]=k;bt(i+1,rem-k);}
  }
  if(maxS>0)bt(0,maxS);
  if(!res.length)res.push(new Array(pool.length).fill(0));
  return res;
}

/*
 * 최종Stat 계산 공식 (게임 수식 그대로 INT = Math.floor):
 *   A = base + gem + potion
 *   B = INT(A * (1 + acc% + enc%))
 *   C = INT(B * (1 + spirit%))
 *   D = INT(C * (1 + pendant%))
 *   E = INT(INT(spiritPlus * (1 + spirit%)) * (1 + pendant%))
 *   F = INT(spiritBonus * (1 + pendant%))
 *   buf = INT(bufLevel * base * 0.20)
 *   finalStat = D + E + F + collection + buf
 */
function calcStat(B,G,P,AP,SP,PP,SL,SB,C,BU){
  const a=Math.floor((B+G+P)*(1+AP));
  const b=Math.floor(a*(1+SP));
  const c=Math.floor(b*(1+PP));
  const d=Math.floor(Math.floor(SL*(1+SP))*(1+PP));
  const e=Math.floor(SB*(1+PP));
  return c+d+e+C+BU;
}

// Spirit 상태를 Stat별 + / % / Spirit type 기여로 변환
function procSpirit(){
  const sp=S.spirit;
  const lv=5;
  const plus={hp:0,atk:0,def:0},pct={hp:0,atk:0,def:0},bonus={hp:0,atk:0,def:0};
  for(let i=0;i<4;i++){
    if(i+1>lv)continue;
    const o=sp.opts[i];
    if(!o||!o.stat||!o.type)continue;
    if(o.type==='+')plus[o.stat]+=SP_PLUS[o.stat][i+1];
    else if(o.type==='%')pct[o.stat]+=SP_PCT[i+1];
  }
  if(sp.bonus&&SP_BONUS[sp.bonus])bonus[sp.bonus]=SP_BONUS[sp.bonus];
  return{plus,pct,bonus};
}

function getBufCombos(bufLv){
  if(bufLv===0)return[{h:0,a:0,d:0,w:1,label:'No buff'}];
  if(bufLv===1)return[
    {h:1,a:0,d:0,w:1/3,label:'HP'},
    {h:0,a:1,d:0,w:1/3,label:'ATK'},
    {h:0,a:0,d:1,w:1/3,label:'DEF'},
  ];
  return[
    {h:2,a:0,d:0,w:1/9,label:'HP+HP'},
    {h:1,a:1,d:0,w:2/9,label:'HP+ATK'},
    {h:1,a:0,d:1,w:2/9,label:'HP+DEF'},
    {h:0,a:2,d:0,w:1/9,label:'ATK+ATK'},
    {h:0,a:1,d:1,w:2/9,label:'ATK+DEF'},
    {h:0,a:0,d:2,w:1/9,label:'DEF+DEF'},
  ];
}

function runSim(){
  const encMode=document.querySelector('input[name="enc-mode"]:checked')?.value||'fixed';
  const accSeen=new Set();
  const ownedAcc=S.accCards
    .filter(c=>c.name)
    .map(c=>({...ACC_DB.find(a=>a.n===c.name),_enc:encMode==='infinite'?'none':c.enchant}))
    .filter(a=>{
      if(!a.n)return false;
      const key=encMode==='fixed'?`${a.n}|${a._enc||'none'}`:a.n;
      if(accSeen.has(key))return false;
      accSeen.add(key);return true;
    });
  if(!ownedAcc.length){alert('Add at least one accessory in the My Spec tab.');return;}
  const btn=document.getElementById('sim-btn');
  btn.disabled=true;btn.textContent='⏳ Calculating...';
  setTimeout(()=>{
    try{
      const bufCombos=getBufCombos(simBuf);
      const excSun=document.getElementById('exc-sun-pend').checked;
      renderResTop(doSimTop(ownedAcc,bufCombos,excSun));
      renderResAvg(doSimAvg(ownedAcc,bufCombos,excSun));
      const rs=document.getElementById('res-sec');
      rs.style.display='';
      switchResTab('avg');
      rs.scrollIntoView({behavior:'smooth',block:'start'});
    }catch(e){console.error(e);alert('Error: '+e.message);}
    btn.disabled=false;btn.textContent='🐉 Run Simulation';
  },20);
}

function getPends(excSun){
  const raw=S.pendants.length?S.pendants:[null];
  const filtered=excSun?raw.filter(p=>!p||p.type!=='태양'):raw;
  const seen=new Set();
  const deduped=filtered.filter(p=>{
    if(!p)return true;
    const mo=p.type==='태양'?3:p.type==='달'?2:1;
    const opts=p.options
      .slice(0,mo)
      .map(o=>`${o.stat}:${o.val||0}`)
      .sort()
      .join(',');
    const k=`${p.type}:${opts}`;
    if(seen.has(k))return false;
    seen.add(k);return true;
  });
  return deduped.length?deduped:[null];
}

function calcPendPct(pend){
  let pH=0,pA=0,pD=0;
  if(pend){
    const mo=pend.type==='태양'?3:pend.type==='달'?2:1;
    pend.options.slice(0,mo).forEach(o=>{
      if(!o||!o.stat)return;
      const v=(o.val||0)/100;
      if(o.stat==='hp')pH+=v;else if(o.stat==='atk')pA+=v;else pD+=v;
    });
  }
  return{pH,pA,pD};
}

function doSimTop(ownedAcc,bufCombos,excSun){
  const {plus:sP,pct:sPct,bonus:sB}=procSpirit();
  const pool=buildPool();
  const allocs=genAllocs(pool,5);
  const pends=getPends(excSun);
  const coll=S.coll;
  const encMode=document.querySelector('input[name="enc-mode"]:checked')?.value||'fixed';
  const top10=[];
  let minBV=-Infinity;

  for(const dt of DTYPES){
    const bs=BASE[simGrade][dt];
    const bh=bs.hp,ba=bs.atk,bd=bs.def;
    for(const acc of ownedAcc){
      const encs=encMode==='infinite'?['hp','atk','def']:[acc._enc||'none'];
      for(const enc of encs){
        const aH=acc.hp+(enc==='hp'?.21:0);
        const aA=acc.atk+(enc==='atk'?.21:0);
        const aD=acc.def+(enc==='def'?.21:0);
        for(const pend of pends){
          const{pH,pA,pD}=calcPendPct(pend);
          for(const alloc of allocs){
            let gH=0,gA=0,gD=0;
            for(let i=0;i<alloc.length;i++){gH+=alloc[i]*pool[i].h;gA+=alloc[i]*pool[i].a;gD+=alloc[i]*pool[i].d;}
            for(const buf of bufCombos){
              const bufH=Math.floor(buf.h*bh*.2);
              const bufA=Math.floor(buf.a*ba*.2);
              const bufD=Math.floor(buf.d*bd*.2);
              const fH=calcStat(bh,gH,24,aH,sPct.hp,pH,sP.hp,sB.hp,coll.hp,bufH);
              const fA=calcStat(ba,gA,6,aA,sPct.atk,pA,sP.atk,sB.atk,coll.atk,bufA);
              const fD=calcStat(bd,gD,6,aD,sPct.def,pD,sP.def,sB.def,coll.def,bufD);
              const bv=fH*fA*fD;
              if(bv>minBV||top10.length<10){
                let lo=0,hi=top10.length;
                while(lo<hi){const m=(lo+hi)>>1;if(top10[m].bv>=bv)lo=m+1;else hi=m;}
                top10.splice(lo,0,{bv,dt,accN:acc.n,enc,pend,buf,alloc:alloc.map((k,i)=>({k,g:pool[i]})).filter(x=>x.k>0),fH,fA,fD});
                if(top10.length>10)top10.pop();
                minBV=top10.length===10?top10[9].bv:-Infinity;
              }
            }
          }
        }
      }
    }
  }
  return top10;
}

//Run Simulation 관련
function doSimAvg(ownedAcc,bufCombos,excSun){
  const {plus:sP,pct:sPct,bonus:sB}=procSpirit();
  const pool=buildPool();
  const allocs=genAllocs(pool,5);
  const pends=getPends(excSun);
  const coll=S.coll;
  const encMode=document.querySelector('input[name="enc-mode"]:checked')?.value||'fixed';
  const results=[];

  for(const dt of DTYPES){
    const bs=BASE[simGrade][dt];
    const bh=bs.hp,ba=bs.atk,bd=bs.def;
    const bufResults=[];

    for(const buf of bufCombos){
      const bufH=Math.floor(buf.h*bh*.2);
      const bufA=Math.floor(buf.a*ba*.2);
      const bufD=Math.floor(buf.d*bd*.2);
      const top5=[];
      let minBV=-Infinity;

      for(const acc of ownedAcc){
        const encs=encMode==='infinite'?['hp','atk','def']:[acc._enc||'none'];
        for(const enc of encs){
          const aH=acc.hp+(enc==='hp'?.21:0);
          const aA=acc.atk+(enc==='atk'?.21:0);
          const aD=acc.def+(enc==='def'?.21:0);
          for(const pend of pends){
            const{pH,pA,pD}=calcPendPct(pend);
            for(const alloc of allocs){
              let gH=0,gA=0,gD=0;
              for(let i=0;i<alloc.length;i++){gH+=alloc[i]*pool[i].h;gA+=alloc[i]*pool[i].a;gD+=alloc[i]*pool[i].d;}
              const fH=calcStat(bh,gH,24,aH,sPct.hp,pH,sP.hp,sB.hp,coll.hp,bufH);
              const fA=calcStat(ba,gA,6,aA,sPct.atk,pA,sP.atk,sB.atk,coll.atk,bufA);
              const fD=calcStat(bd,gD,6,aD,sPct.def,pD,sP.def,sB.def,coll.def,bufD);
              const bv=fH*fA*fD;
              if(bv>minBV||top5.length<5){
                let lo=0,hi=top5.length;
                while(lo<hi){const m=(lo+hi)>>1;if(top5[m].bv>=bv)lo=m+1;else hi=m;}
                top5.splice(lo,0,{bv,accN:acc.n,enc,pend,alloc:alloc.map((k,i)=>({k,g:pool[i]})).filter(x=>x.k>0),fH,fA,fD});
                if(top5.length>5)top5.pop();
                minBV=top5.length===5?top5[4].bv:-Infinity;
              }
            }
          }
        }
      }
      bufResults.push({label:buf.label,w:buf.w,top5,bestBV:top5.length?top5[0].bv:0});
    }

    bufResults.sort((a,b)=>b.bestBV-a.bestBV);
    const avgBV=bufResults.reduce((s,b)=>s+b.w*b.bestBV,0);
    const peakBV=bufResults[0].bestBV;
    const bottomBV=bufResults[bufResults.length-1].bestBV;
    const score=avgBV*0.5+bottomBV*0.3+peakBV*0.2;
    results.push({dt,avgBV,peakBV,bottomBV,score,bufResults});
  }

  results.sort((a,b)=>b.score-a.score);
  return results;
}

function fmtBufLabel(label){

    return(i>0?`<span style="color:var(--text)">+</span>`:'')
      +`<span style="color:${col};font-weight:700">${trimmed}</span>`;

}

      <td class="bv-cell">${(r.bv/1e6).toFixed(1)}</td>
    </tr>`;
  });
  el.innerHTML=mobHtml+'</div>'+pcHtml+'</tbody></table>';
}

//Average B-Val 결과 출력
function renderResAvg(results){
  const el=document.getElementById('res-body-avg');
  if(!results.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--dim)">No results</div>';return;}
  let html=`<table class="rtbl"><thead><tr>
    <th class="pc-only">Type</th><th class="pc-only">High</th><th class="pc-only">Low</th><th class="pc-only">Average B-Val</th>
    <th class="pc-only" style="color:var(--text)">Final Score
      <span style="display:inline-block;width:16px;height:16px;background:#fff;color:#000;border-radius:50%;font-size:11px;font-weight:800;text-align:center;line-height:16px;cursor:help;margin-left:4px;position:relative"
        onmouseenter="document.getElementById('score-tip').style.display='block'"
        onmouseleave="document.getElementById('score-tip').style.display='none'">?</span>
      <div id="score-tip" style="display:none;position:absolute;background:var(--sf2);color:var(--text);font-size:12px;font-weight:400;padding:7px 11px;border-radius:6px;border:1px solid var(--bd);white-space:nowrap;z-index:999;margin-top:4px">
        A composite value considering the weighted average, high and low.<br><br>Formula: weighted-avg B-Val ×0.5 + low ×0.3 + high ×0.2
      </div>
    </th>
  </tr></thead><tbody>`;
  results.forEach((r,i)=>{
    const dc=DCOLORS[r.dt];
    const peak=r.bufResults[0];
    const bottom=r.bufResults[r.bufResults.length-1];
    html+=`<tr style="cursor:pointer" onclick="toggleAvgDetail(${i})">
      <td class="pc-only">
        <span class="dtype-b" style="color:${dc};border-color:${dc}">${T_TYPE_S[r.dt]||r.dt}</span>
        <span class="avg-arrow" id="avg-arrow-${i}" style="color:var(--text);font-size:10px;margin-left:6px">▼</span>
      </td>
      <td class="pc-only"><span class="bv-cell">${(peak.bestBV/1e6).toFixed(1)}</span> (${fmtBufLabel(peak.label)})</td>
      <td class="pc-only"><span class="bv-cell">${(bottom.bestBV/1e6).toFixed(1)}</span> (${fmtBufLabel(bottom.label)})</td>
      <td class="pc-only bv-cell">${(r.avgBV/1e6).toFixed(1)}</td>
      <td class="pc-only bv-cell" style="color:var(--gold)">${(r.score/1e6).toFixed(1)}</td>
      <td class="mob-only" style="padding:10px 14px">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
          <div>
            <span class="dtype-b" style="color:${dc};border-color:${dc}">${T_TYPE_S[r.dt]||r.dt}</span>
            <span class="avg-arrow" id="avg-arrow-${i}" style="color:var(--text);font-size:10px;margin-left:6px">▼</span>
          </div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px">
            <span><span style="color:var(--dim);font-size:10px">High </span><span class="bv-cell">${(peak.bestBV/1e6).toFixed(1)}</span></span>
            <span><span style="color:var(--dim);font-size:10px">Low </span><span class="bv-cell">${(bottom.bestBV/1e6).toFixed(1)}</span></span>
            <span><span style="color:var(--dim);font-size:10px">Avg </span><span class="bv-cell">${(r.avgBV/1e6).toFixed(1)}</span></span>
            <span><span style="color:var(--dim);font-size:10px">Score </span><span class="bv-cell" style="color:var(--gold)">${(r.score/1e6).toFixed(1)}</span></span>
          </div>
        </div>
      </td>
    </tr>
    <tr id="avg-detail-${i}" style="display:none">
      <td colspan="6" style="padding:0">${renderAvgDetail(r)}</td>
    </tr>`;
  });
  el.innerHTML=html+'</tbody></table>';
}

function toggleAvgDetail(i){
  const el=document.getElementById(`avg-detail-${i}`);
  const arrow=document.getElementById('avg-arrow-'+i);
  if(!el)return;
  const open=el.style.display==='none';
  el.style.display=open?'':'none';
  if(arrow)arrow.textContent=open?'▲':'▼';
}

function renderAvgDetail(r){
  const medals=['🥇','🥈','🥉'];
  let mobHtml='<div class="mob-only" style="padding:10px 0;background:var(--sf2)">';
  let pcHtml='<div class="pc-only" style="padding:10px 16px;background:var(--sf2)">';
  r.bufResults.forEach(buf=>{
    const label=`<span class="bv-cell">${(buf.bestBV/1e6).toFixed(1)}</span> (${fmtBufLabel(buf.label)})`;
    mobHtml+=`<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:800;margin:0 14px 6px">${label}</div>`;
    pcHtml+=`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:800;margin-bottom:6px">${label}</div>
      <table class="rtbl" style="min-width:0"><thead><tr>
        <th>Rank</th><th>Accessory / Enchant</th><th>Gem Allocation</th><th>Pendant</th><th>HP / ATK / DEF</th><th>B-Val</th>
      </tr></thead><tbody>`;
    buf.top5.forEach((item,j)=>{
      const rank=j<3?medals[j]:`<span class="rank-n">${j+1}</span>`;
      const a=ACC_DB.find(x=>x.n===item.accN);
      const aImg=a&&a.img?`<img src="${a.img}" style="width:36px;height:36px;object-fit:contain;border-radius:4px">`:'';
      mobHtml+=mkMobCard(rank,'#aaa','',aImg,fmtAccName(item.accN),fmtAccEnc(item.enc),
        fmtGem(item.alloc),fmtPendMob(item.pend),'',
        item.fH.toLocaleString('ko-KR'),item.fA.toLocaleString('ko-KR'),item.fD.toLocaleString('ko-KR'),
        (item.bv/1e6).toFixed(1));
      const pcImg=a&&a.img?`<img src="${a.img}" style="width:28px;height:28px;object-fit:contain;border-radius:3px">`:'';
      pcHtml+=`<tr>
        <td>${rank}</td>
        <td><div style="display:flex;align-items:center;gap:6px">${pcImg}<div><div style="font-weight:800;font-size:12px">${fmtAccName(item.accN)}</div>${fmtAccEnc(item.enc)}</div></div></td>
        <td><div class="gem-tags">${fmtGem(item.alloc)}</div></td>
        <td style="font-size:12px">${fmtPend(item.pend)}</td>
        <td class="st-cell">
          <span style="color:var(--hpc)">${item.fH.toLocaleString('ko-KR')}</span> /
          <span style="color:var(--atc)">${item.fA.toLocaleString('ko-KR')}</span> /
          <span style="color:var(--dfc)">${item.fD.toLocaleString('ko-KR')}</span>
        </td>
        <td class="bv-cell">${(item.bv/1e6).toFixed(1)}</td>
      </tr>`;
    });
    mobHtml+='</div>';
    pcHtml+='</tbody></table></div>';
  });
  return mobHtml+'</div>'+pcHtml+'</div>';
}

// Gem Allocation을 "체2(40,40) 공1(39) 방2(40,38)" 형식으로 포맷
function fmtGem(alloc){
  if(!alloc||!alloc.length)return'<span style="color:var(--dimmer)">None</span>';
  const bySt={hp:[],atk:[],def:[]};
  alloc.forEach(({k,g})=>{for(let i=0;i<k;i++)bySt[g.s].push(g.lv);});
  const cols={hp:'var(--hpc)',atk:'var(--atc)',def:'var(--dfc)'};
  const parts=[];
  for(const s of SKEYS){
    const lvs=bySt[s].sort((a,b)=>b-a);
    if(lvs.length)parts.push(`<span class="gem-tag" style="color:${cols[s]}">${SK[s]}${lvs.length}(${lvs.join(',')})</span>`);
  }
  return parts.length?parts.join(''):'<span style="color:var(--dimmer)">None</span>';
}

// Pendant 포맷 "태양의 Pendant (체6%/공4%/방3%)"
function fmtPend(p){
  if(!p)return'<span style="color:var(--dimmer)">None</span>';
  const mo=p.type==='태양'?3:p.type==='달'?2:1;
  const opts=p.options.slice(0,mo).filter(o=>o&&o.stat).map(o=>{
    const col=o.stat==='hp'?'#fbbf24':o.stat==='atk'?'#f87171':'#60a5fa';
    return`<span style="color:${col}">${SK[o.stat]}</span><span style="color:var(--text)">${o.val||0}%</span>`;
  }).join('<span style="color:var(--dim)">/</span>');
  const img=IMG_PEND[p.type]?`<img src="${IMG_PEND[p.type]}" style="width:36px;height:36px;object-fit:contain;border-radius:4px">`:'';
  const shortTypeMap={'달':'Moon','태양':'Sun','별':'Star'};
  const shortType=shortTypeMap[p.type]||p.type;
  return`<div style="display:flex;align-items:center;gap:8px">${img}<div style="color:var(--text)"><span class="pend-name-full">Pendant of ${T_PEND[p.type]||p.type}</span><span class="pend-name-short">${shortType}</span><br><small>(${opts})</small></div></div>`;
}

<script>
(function(){
  var link=document.getElementById('theme-css');
  if(!link)return;
  var sync=function(){
    var c=document.getElementById('custom-theme-style');
    if(c&&c.textContent&&c.textContent.length>0){document.documentElement.removeAttribute('data-theme');return;}
    var m=String(link.href||'').match(/theme-(dark|light|beige)\.css/);
    document.documentElement.setAttribute('data-theme',m?m[1]:'dark');
  };
  sync();
  new MutationObserver(sync).observe(link,{attributes:true,attributeFilter:['href']});
  new MutationObserver(sync).observe(document.head,{childList:true,subtree:true,characterData:true});
})();
</script>
