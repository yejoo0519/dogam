<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>레이드 정보</title>
<link id="theme-css" rel="stylesheet" href="./theme-dark.css">
<script src="./theme.js"></script>
<style>
[data-theme="dark"]{--bg:#0e1116;--bg2:#161a22;--bg3:#1c212c;--border:#23293a;--border2:#1b1f2a;--border3:#2d3447;--text:#eaecf2;--text2:#b3b9c7;--text3:#7d8597;--text4:#565d6e;--accent:#7aa2f7;--accent-bg:rgba(122,162,247,0.12);--accent-border:rgba(122,162,247,0.30)}
[data-theme="light"]{--bg:#f7f7f8;--bg2:#ffffff;--bg3:#f1f2f4;--border:#e6e7ea;--border2:#eeeff2;--border3:#d4d6db;--text:#15171c;--text2:#4a4d57;--text3:#71757f;--text4:#9aa0aa;--accent:#2f6fed;--accent-bg:rgba(47,111,237,0.10);--accent-border:rgba(47,111,237,0.32)}
[data-theme="beige"]{--bg:#f3ecdd;--bg2:#faf3e2;--bg3:#ebe0c7;--border:#d8caa8;--border2:#e1d4b3;--border3:#c0ad84;--text:#2a2316;--text2:#5a4e34;--text3:#837553;--text4:#a99971;--accent:#b06a1e;--accent-bg:rgba(176,106,30,0.10);--accent-border:rgba(176,106,30,0.32)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);padding:16px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;text-decoration:none;margin-bottom:20px;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--text)}
.page-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:20px}
.raid-grid{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:700px){.raid-grid{grid-template-columns:1fr 1fr}}
.raid-section{}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.section-name{font-size:16px;font-weight:700;color:var(--text)}
.section-en{font-size:10px;font-weight:600;color:var(--text4);letter-spacing:.1em;text-transform:uppercase;margin-left:6px}
.section-count{font-size:11px;color:var(--text3)}
.boss-cards{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.boss-card{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:border-color .15s,background .15s}
.boss-card:hover{border-color:var(--accent);background:var(--bg3)}
.boss-card.active{border-color:var(--accent);background:var(--accent-bg)}
.boss-card-img{width:40px;height:40px;object-fit:contain;border-radius:6px;flex-shrink:0;background:var(--bg3)}
.boss-card-name{font-size:12px;font-weight:600;color:var(--text)}
/* 모달 */
.boss-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto}
.boss-modal.open{display:flex}
.boss-modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:580px;position:relative;margin:auto}
.bm-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer}
.bm-close:hover{color:var(--text)}
/* 모달 내부 */
.bm-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.bm-img{width:58px;height:58px;object-fit:contain;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0}
.bm-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:3px}
.bm-section{font-size:12px;color:var(--text3)}
.bm-badges{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.bm-badge-box{background:var(--bg3);border-radius:8px;padding:9px 12px;border:1px solid var(--border2)}
.bm-badge-label{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.bm-badge-row{display:flex;flex-wrap:wrap;gap:4px}
.bm-attr{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--bg2);border:1px solid var(--border)}
.bm-attr img{width:16px;height:16px;object-fit:contain;border-radius:3px}
.bm-type{display:inline-block;font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--bg2);color:var(--text2);border:1px solid var(--border3)}
.bm-none{display:inline-block;font-size:12px;color:var(--text4);padding:3px 8px}
.bm-cards{display:flex;flex-direction:column;gap:8px}
.bm-card{background:var(--bg3);border-radius:8px;padding:12px 14px;border:1px solid var(--border2);border-left:2px solid}
.bm-card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.bm-card-txt{font-size:13px;color:var(--text);line-height:1.8}
/* 인라인 배지 */
.bm-card-txt .ta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:1px 7px;border-radius:5px;background:var(--bg2);border:1px solid var(--border);vertical-align:middle}
.bm-card-txt .ta img{width:14px;height:14px;object-fit:contain;border-radius:2px}
.bm-card-txt .t{display:inline-block;font-size:11px;font-weight:600;padding:1px 7px;border-radius:5px;background:var(--bg2);color:var(--text2);border:1px solid var(--border3);vertical-align:middle}
.bm-card-txt .bns{display:inline-block;font-size:11px;font-weight:600;padding:1px 7px;border-radius:5px;background:#c6c6eb;color:#3a3a7a;border:1px solid #a0a0d0;vertical-align:middle}
</style>
</head>

function renderAttr(a){
  if(!a)return'<span class="bm-none">없음</span>';
  const info=ATTR[a];
  if(!info)return`<span class="bm-attr">${a}</span>`;
  return`<span class="bm-attr"><img src="${info.icon}" onerror="this.style.display='none'">${a}</span>`;
}

  return t.replace(/<span class="ta" data-a="([^"]+)"><\/span>/g,(_,a)=>{
    const info=ATTR[a];
    if(!info)return`<span class="ta"><span>${a}</span></span>`;
    return`<span class="ta"><img src="${info.icon}" onerror="this.style.display='none'"><span>${a}</span></span>`;
  });
}

function renderCard(card){
  const col=CARD_COLOR[card.c]||'#7d8597';
  return`<div class="bm-card" style="border-left-color:${col}">
    <div class="bm-card-lbl" style="color:${col}">${card.l}</div>
    <div class="bm-card-txt">${processText(card.t)}</div>
  </div>`;
}

function showBoss(num,el){
  document.querySelectorAll('.boss-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const d=BD[num];
  if(!d){document.getElementById('bm-content').innerHTML='<div style="color:var(--text4);padding:20px 0;text-align:center">데이터 준비 중입니다.</div>';document.getElementById('boss-modal').classList.add('open');document.body.style.overflow='hidden';return;}

  let attrHtml='';
  if(d.weakAttr||d.weakType||d.buff){
    if(d.buff){
      attrHtml+=`<div class="bm-badges" style="grid-template-columns:1fr">
        <div class="bm-badge-box">
          <div class="bm-badge-label">약점 속성</div>
          <div class="bm-badge-row">${(d.weakAttr||[]).map(renderAttr).join('')}</div>
          <div class="bm-badge-label" style="margin-top:8px">약점 버프</div>
          <div class="bm-badge-row"><span class="bm-type" style="color:var(--accent)">${d.buff}</span></div>
        </div>
      </div>`;
    } else {
      attrHtml+='<div class="bm-badges">';
      if(d.weakAttr!==undefined){
        attrHtml+=`<div class="bm-badge-box"><div class="bm-badge-label">약점 속성</div><div class="bm-badge-row">${d.weakAttr?d.weakAttr.map(renderAttr).join(''):'<span class="bm-none">없음</span>'}</div></div>`;
      }
      if(d.weakType){
        attrHtml+=`<div class="bm-badge-box"><div class="bm-badge-label">약점 타입</div><div class="bm-badge-row">${d.weakType.map(t=>`<span class="bm-type">${t}</span>`).join('')}</div></div>`;
      }
      attrHtml+='</div>';
    }
  }

  document.getElementById('bm-content').innerHTML=`
    <div class="bm-header">
      <img class="bm-img" src="https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/boss/${num}.png">
      <div><div class="bm-name">${d.name}</div><div class="bm-section">${d.section}</div></div>
    </div>
    ${attrHtml}
    <div class="bm-cards">${(d.cards||[]).map(renderCard).join('')}</div>
  `;

  document.getElementById('boss-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeBoss(e){
  if(e&&e.target!==document.getElementById('boss-modal'))return;
  document.getElementById('boss-modal').classList.remove('open');
  document.body.style.overflow='';
  document.querySelectorAll('.boss-card').forEach(c=>c.classList.remove('active'));
}

(function(){
  const from=new URLSearchParams(location.search).get('from');
  const btn=document.getElementById('back-btn');
  if(from&&['info','community','weekly','guide'].includes(from))btn.href=`./index.html?tab=${from}`;
})();
</script>

<script>
(function(){
  var link=document.getElementById('theme-css');
  if(!link)return;
  var sync=function(){
    var c=document.getElementById('custom-theme-style');
    if(c&&c.textContent&&c.textContent.length>0){document.documentElement.removeAttribute('data-theme');return;}
    var m=String(link.href||'').match(/theme-(dark|light|beige)\.css/);
    document.documentElement.setAttribute('data-theme',m?m[1]:'dark');
  };
  sync();
  new MutationObserver(sync).observe(link,{attributes:true,attributeFilter:['href']});
  new MutationObserver(sync).observe(document.head,{childList:true,subtree:true,characterData:true});
})();
</script>
</body>
</html>
