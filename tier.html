        ?`<img src="${imgSrc}" class="dragon-img" alt="${d.n}">`
        :`<div class="img-placeholder"></div>`;
      rows+=`<tr class="${d.ex?'ex-true':'ex-false'}">`+`
        <td class="center rank">${i+1}</td>
        <td class="center" style="width:42px">${imgCell}</td>
        <td class="center"><span class="badge-type">${d.t}</span></td>
        <td style="font-size:12px;font-weight:500">${d.n}</td>
        <td class="center ${d.lv==='O'?'lv-o':'lv-x'}">${d.lv}</td>
        <td class="center ${tierClass(d.g)}">${Number.isInteger(d.g)?d.g.toFixed(1):d.g}</td>
      </tr>`;
    });

    panel.innerHTML=`
      <div class="panel-header">
        ${iconHtml}
        <span>${cfg.label}</span>
      </div>
      <table>
        <thead><tr>
          <th style="width:24px"></th>
          <th style="width:42px"></th>
          <th class="center">타입</th>
          <th class="left">드래곤</th>
          <th class="center">레벨업</th>
          <th class="center">등급</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    panels.appendChild(panel);
  });

  document.getElementById("count").textContent=`${total}마리`;
}

render();
</script>

<script>
/* ── data-theme 동기화 (theme.js 연동) ── */
(function(){
  var link = document.getElementById('theme-css');
  if (!link) return;
  var sync = function() {
    var c = document.getElementById('custom-theme-style');
    if (c && c.textContent && c.textContent.length > 0) {
      document.documentElement.removeAttribute('data-theme');
      return;
    }
    var m = String(link.href || '').match(/theme-(dark|light|beige)\.css/);
    document.documentElement.setAttribute('data-theme', m ? m[1] : 'dark');
  };
  sync();
  new MutationObserver(sync).observe(link, { attributes: true, attributeFilter: ['href'] });
  new MutationObserver(sync).observe(document.head, { childList: true, subtree: true, characterData: true });
})();
</script>
</body>
</html>
